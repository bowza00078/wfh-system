<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ระบบลงชื่อปฏิบัติงาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: { navy: '#1e3a8a', primary: '#2563eb', bglight: '#f3f4f6' }
                }
            }
        }
    </script>
</head>
<body class="bg-bglight font-sans text-gray-800 antialiased min-h-screen">

    <nav class="bg-navy text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div>
                <h1 class="font-bold text-lg tracking-wide">Admin Panel</h1>
                <p class="text-blue-200 text-xs">สรุปข้อมูลการลงชื่อปฏิบัติงาน</p>
            </div>
            <a href="index.html" class="text-sm bg-white text-navy px-3 py-1 rounded-md font-medium hover:bg-gray-100 transition">กลับหน้าลงชื่อ</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 py-6">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-2xl font-bold text-navy">ภาพรวมของวันนี้</h2>
                <p class="text-gray-500 text-sm mt-1" id="display-date">กำลังโหลดวันที่...</p>
            </div>
            <div id="loading-status" class="text-sm font-medium text-emerald-600 bg-emerald-100 px-3 py-1 rounded-full animate-pulse">
                กำลังเชื่อมต่อฐานข้อมูล...
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm font-medium">ลงชื่อเข้างานวันนี้รวม</p>
                <div class="flex items-baseline gap-2 mt-1">
                    <h3 class="text-3xl font-bold text-gray-800" id="count-total">0</h3>
                    <span class="text-sm text-gray-500">คน</span>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-amber-500">
                <p class="text-gray-500 text-sm font-medium">บ้าน (WFH)</p>
                <div class="flex items-baseline gap-2 mt-1">
                    <h3 class="text-3xl font-bold text-gray-800" id="count-wfh">0</h3>
                    <span class="text-sm text-gray-500">คน</span>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-purple-500">
                <p class="text-gray-500 text-sm font-medium">ออกปฏิบัติราชการ</p>
                <div class="flex items-baseline gap-2 mt-1">
                    <h3 class="text-3xl font-bold text-gray-800" id="count-fieldwork">0</h3>
                    <span class="text-sm text-gray-500">คน</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-bold text-lg text-gray-800">ประวัติการลงชื่อทั้งหมด</h3>
                <button onclick="loadData()" class="text-sm text-blue-600 hover:underline">รีเฟรชข้อมูล 🔄</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-600">
                    <thead class="bg-gray-50 text-gray-700 uppercase text-xs">
                        <tr>
                            <th scope="col" class="px-6 py-3 font-medium">วันที่</th>
                            <th scope="col" class="px-6 py-3 font-medium">เวลา</th>
                            <th scope="col" class="px-6 py-3 font-medium">ชื่อ-สกุล</th>
                            <th scope="col" class="px-6 py-3 font-medium">สถานที่</th>
                            <th scope="col" class="px-6 py-3 font-medium">ภารกิจ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center text-gray-400">กำลังดึงข้อมูลจากตาราง...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // *** นำลิงก์ Web App URL อันใหม่ของคุณมาวางที่นี่ ***
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwXY3dZo1Se6LjXvlvKEe0mSqK57qKAfmDCQcD91on4IDUzbN28nytAAgOZQ1RaIRaQQg/exec';

        // ตั้งค่าแสดงวันที่ปัจจุบัน
        const today = new Date();
        document.getElementById('display-date').innerText = today.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // สร้างวันที่ในรูปแบบ dd/MM/yyyy เพื่อใช้คัดกรองข้อมูลของ "วันนี้"
        const todayStr = String(today.getDate()).padStart(2, '0') + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + today.getFullYear();

        // ฟังก์ชันดึงข้อมูลจาก Google Sheets
        async function loadData() {
            const statusBadge = document.getElementById('loading-status');
            statusBadge.innerText = 'กำลังโหลดข้อมูล...';
            statusBadge.classList.remove('hidden');

            try {
                // เรียกข้อมูล JSON จาก Apps Script
                const response = await fetch(scriptURL);
                const data = await response.json();
                
                // นำข้อมูลไปคำนวณและแสดงผล
                displayDashboard(data);
                
                statusBadge.innerText = 'อัปเดตข้อมูลล่าสุดแล้ว';
                setTimeout(() => statusBadge.classList.add('hidden'), 3000);
            } catch (error) {
                console.error("Error:", error);
                statusBadge.innerText = 'เกิดข้อผิดพลาดในการโหลดข้อมูล';
                statusBadge.classList.replace('bg-emerald-100', 'bg-red-100');
                statusBadge.classList.replace('text-emerald-600', 'text-red-600');
            }
        }

        function displayDashboard(data) {
            let totalToday = 0;
            let wfhToday = 0;
            let fieldworkToday = 0;
            let tableHTML = '';

            // วนลูปอ่านข้อมูลทีละแถว (ย้อนกลับจากล่าสุดไปเก่าสุด)
            for (let i = data.length - 1; i >= 0; i--) {
                const row = data[i];

                // นับสถิติเฉพาะของ "วันนี้"
                if (row.date === todayStr) {
                    totalToday++;
                    if (row.location === 'บ้าน (WFH)') wfhToday++;
                    else if (row.location === 'ออกปฏิบัติราชการ') fieldworkToday++;
                }

                // กำหนดสีของป้ายสถานะ
                let badgeClass = "bg-gray-100 text-gray-700";
                if (row.location === 'บ้าน (WFH)') badgeClass = "bg-amber-100 text-amber-700";
                else if (row.location === 'ออกปฏิบัติราชการ') badgeClass = "bg-purple-100 text-purple-700";

                // สร้าง HTML สำหรับตาราง
                tableHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 whitespace-nowrap">${row.date}</td>
                        <td class="px-6 py-4 whitespace-nowrap">${row.time}</td>
                        <td class="px-6 py-4 font-medium text-gray-800">${row.name}</td>
                        <td class="px-6 py-4">
                            <span class="${badgeClass} px-2 py-1 rounded-md text-xs font-semibold">${row.location}</span>
                        </td>
                        <td class="px-6 py-4">${row.task}</td>
                    </tr>
                `;
            }

            // แสดงผลตัวเลขสถิติบนหน้าเว็บ
            document.getElementById('count-total').innerText = totalToday;
            document.getElementById('count-wfh').innerText = wfhToday;
            document.getElementById('count-fieldwork').innerText = fieldworkToday;

            // แสดงผลตาราง (ถ้าไม่มีข้อมูลให้ขึ้นว่าไม่พบข้อมูล)
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = tableHTML !== '' ? tableHTML : `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">ยังไม่มีข้อมูลการลงชื่อ</td></tr>`;
        }

        // โหลดข้อมูลอัตโนมัติเมื่อเปิดหน้าเว็บ
        window.onload = loadData;
    </script>
</body>
</html>
